databases:
  - name: myDB  # Match this to the actual Render database
    databaseName: mydb_1gbd  # Ensure the actual name matches here
    user: hossain_araf
    plan: free
services:
  - type: web
    name: medic-bd-api  # Use the correct name for your web service here
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: myDB  # This matches the `name` under `databases`
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
    onDeploy:
      - shell: bash
       command: "bundle exec rails db:migrate"
