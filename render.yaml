databases:
  - name: utd-core
    databaseName: utd_core
    user: utd_core_user
    plan: free
services:
  - type: web
    name: medic-bd-api-v1
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: utd-core
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
