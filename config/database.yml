default: &default
  adapter: postgresql
  encoding: unicode

  # pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: medic_bd_dev
  user: <%= Rails.application.credentials.dig(:development, :database_user) %>
  password: <%= Rails.application.credentials.dig(:development, :database_password) %>
  schema_search_path: medicbd, public

test:
  <<: *default
  database: medic_bd_test
  user: <%= Rails.application.credentials.dig(:test, :database_user) %>
  password: <%= Rails.application.credentials.dig(:test, :database_password) %>
  schema_search_path: medicbd, public
  

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  schema_search_path: medicbd, public
