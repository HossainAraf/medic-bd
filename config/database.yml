default: &default
  adapter: postgresql
  encoding: unicode

  # pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: medic_bd_dev
  user: <%= Rails.application.credentials.dig(:development, :database_user) %>
  password: <%= Rails.application.credentials.dig(:development, :database_password) %>
  host: 127.0.0.1
  port: 5432

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  schema_search_path: medicbd
  